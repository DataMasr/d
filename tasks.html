<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قائمة المهام - نظام الإدارة</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/auth.js"></script>
  <style>
    .tasks-container {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 1.5rem;
      align-items: start;
      margin-top: 1.5rem;
    }
    @media (max-width: 900px) {
      .tasks-container { grid-template-columns: 1fr; }
      .orders-panel { position: static !important; }
      .orders-list { max-height: 240px; }
    }

    .orders-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.25rem;
      box-shadow: var(--shadow-sm); position: sticky; top: 1.5rem;
    }
    .details-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.5rem;
      box-shadow: var(--shadow-sm); min-height: 60vh;
    }

    .orders-search {
      width: 100%; padding: 0.6rem 1rem; border-radius: 8px;
      border: 1.5px solid var(--border); background: var(--bg-color);
      font-family: inherit; font-size: 0.85rem; color: var(--text-main);
      margin-top: 0.85rem; transition: border-color 0.2s; outline: none;
    }
    .orders-search:focus { border-color: var(--primary-light); }
    .orders-list { max-height: calc(100vh - 330px); overflow-y: auto; margin-top: 0.85rem; }
    .orders-list::-webkit-scrollbar { width: 4px; }
    .orders-list::-webkit-scrollbar-thumb { background: #dde1e9; border-radius: 8px; }

    .task-order-item {
      background: var(--bg-color); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 0.85rem 1rem;
      margin-bottom: 0.6rem; cursor: pointer; transition: var(--transition);
      position: relative; overflow: hidden;
    }
    .task-order-item::before {
      content:''; position:absolute; right:0; top:0; bottom:0; width:3px;
      background:transparent; border-radius:0 3px 3px 0; transition:background 0.2s;
    }
    .task-order-item:hover { box-shadow:var(--shadow-md); border-color:#c7d2fe; transform:translateY(-1px); }
    .task-order-item:hover::before { background:var(--primary-light); }
    .task-order-item.active { background:var(--primary-bg); border-color:rgba(79,70,229,0.2); }
    .task-order-item.active::before { background:var(--primary); }
    .order-progress-track { width:100%; height:4px; background:#e8ecf2; border-radius:10px; overflow:hidden; margin-top:0.5rem; }
    .order-progress-bar { height:100%; background:linear-gradient(90deg,var(--primary),#818cf8); border-radius:10px; transition:width 0.4s; }

    .lanes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    @media (max-width: 1100px) { .lanes-grid { grid-template-columns: 1fr; } }

    .lane-card {
      border-radius: var(--radius-lg); border: 1.5px solid var(--border);
      overflow: hidden; transition: var(--transition);
    }
    .lane-header {
      padding: 0.85rem 1rem;
      display: flex; align-items: center; gap: 0.6rem;
      font-weight: 800; font-size: 0.9rem;
    }
    .lane-body { padding: 0.75rem; }

    .lane-production .lane-header { background: rgba(124,58,237,0.07); color: #6d28d9; border-bottom: 1.5px solid rgba(124,58,237,0.12); }
    .lane-production { border-color: rgba(124,58,237,0.2); }
    .lane-inventory .lane-header { background: rgba(5,150,105,0.07); color: #047857; border-bottom: 1.5px solid rgba(5,150,105,0.12); }
    .lane-inventory { border-color: rgba(5,150,105,0.2); }
    .lane-purchasing .lane-header { background: rgba(217,119,6,0.07); color: #b45309; border-bottom: 1.5px solid rgba(217,119,6,0.12); }
    .lane-purchasing { border-color: rgba(217,119,6,0.2); }

    .lane-locked .lane-body { opacity: 0.55; pointer-events: none; }
    .locked-badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: #f1f5f9; color: #64748b; padding: 3px 10px;
      border-radius: 6px; font-size: 0.7rem; font-weight: 700;
      border: 1px solid #e2e8f0;
    }
    .completed-badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: #dcfce7; color: #15803d; padding: 3px 10px;
      border-radius: 6px; font-size: 0.7rem; font-weight: 700;
      border: 1px solid #bbf7d0;
    }

    .task-row {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.65rem 0.75rem; background: var(--bg-color);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      margin-bottom: 0.5rem; transition: var(--transition);
    }
    .task-row:hover { border-color: #c7d2fe; }
    .task-row.completed { background: rgba(5,150,105,0.03); border-color: rgba(5,150,105,0.15); }
    .task-row.completed .task-text { text-decoration: line-through; color: var(--text-light); }

    .custom-checkbox {
      width: 20px; height: 20px; min-width: 20px;
      border: 2px solid #c7d2fe; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition); background: #fff; cursor: pointer; flex-shrink: 0;
    }
    .task-row.completed .custom-checkbox { background: var(--success); border-color: var(--success); }
    .custom-checkbox svg { width:11px; height:11px; fill:none; stroke:#fff; stroke-width:3; opacity:0; transition:opacity 0.15s; stroke-linecap:round; stroke-linejoin:round; }
    .task-row.completed .custom-checkbox svg { opacity:1; }
    .task-text { font-size: 0.85rem; font-weight: 600; flex: 1; line-height: 1.4; padding-top: 2px; }

    .btn-task-action {
      background: transparent; border: none; cursor: pointer; padding: 3px;
      border-radius: 5px; transition: var(--transition); display: flex; align-items: center; flex-shrink: 0;
    }
    .btn-task-action:hover { background: #f1f5f9; }
    .btn-task-delete:hover { background: #fee2e2; color: #ef4444; }

    /* Purchase details */
    .purchase-details-strip {
      margin-top: 0.4rem;
      display: flex; flex-wrap: wrap; gap: 0.35rem;
    }
    .purchase-chip {
      background: rgba(217,119,6,0.1); color: #92400e;
      padding: 2px 8px; border-radius: 20px;
      font-size: 0.71rem; font-weight: 700;
      border: 1px solid rgba(217,119,6,0.2);
      display: inline-flex; align-items: center; gap: 0.25rem;
    }

    .add-task-form {
      display: flex; gap: 0.5rem; margin-top: 0.5rem;
      background: var(--bg-color); border: 1.5px dashed var(--border);
      border-radius: var(--radius); padding: 0.6rem;
    }
    .add-task-form:focus-within { border-color: var(--primary-light); border-style: solid; }
    .add-task-input {
      flex: 1; padding: 0.55rem 0.8rem; border-radius: 7px;
      border: 1.5px solid var(--border); font-family: inherit; font-size: 0.85rem;
      background: #fff; color: var(--text-main); outline: none; transition: border-color 0.2s;
    }
    .add-task-input:focus { border-color: var(--primary-light); }

    .lane-progress-wrap { padding: 0.5rem 0.75rem 0.25rem; }
    .lane-progress-track { height: 4px; background: #e8ecf2; border-radius: 10px; overflow: hidden; }
    .lane-progress-bar { height: 100%; border-radius: 10px; transition: width 0.4s; }
    .lane-production .lane-progress-bar { background: linear-gradient(90deg,#7c3aed,#a78bfa); }
    .lane-inventory .lane-progress-bar { background: linear-gradient(90deg,#059669,#34d399); }
    .lane-purchasing .lane-progress-bar { background: linear-gradient(90deg,#d97706,#fbbf24); }

    .purchase-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 480px) { .purchase-modal-grid { grid-template-columns: 1fr; } }

    .badge-stage { padding: 0.2rem 0.6rem; font-size: 0.68rem; font-weight: 700; border-radius: 6px; display: inline-flex; align-items: center; white-space: nowrap; }
    .stage-contract { background: rgba(5,150,105,0.08); color: #047857; border: 1px solid rgba(5,150,105,0.15); }
    .stage-production { background: rgba(124,58,237,0.08); color: #6d28d9; border: 1px solid rgba(124,58,237,0.15); }
    .stage-delivery { background: rgba(217,119,6,0.08); color: #b45309; border: 1px solid rgba(217,119,6,0.15); }
    .stage-default { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
  </style>
</head>

<body>
  <main class="main-content">
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;flex-shrink:0;">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        <div>
          <h1 style="font-size:1.4rem;margin:0;">قائمة المهام</h1>
          <p style="font-size:0.82rem;color:var(--text-muted);margin-top:0.1rem;">كل دور يرى مهامه ويضيف عليها — الترتيب إلزامي</p>
        </div>
      </div>
    </div>

    <div class="tasks-container">
      <div class="orders-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:0.9rem;font-weight:800;color:var(--text-main);">الطلبيات النشطة</span>
          <span id="orders-badge" class="badge-stage stage-contract">0 طلبية</span>
        </div>
        <input class="orders-search" type="text" id="search-orders" placeholder="🔍 ابحث..." oninput="filterOrdersList()">
        <div class="orders-list" id="orders-list-container">
          <div style="text-align:center;padding:2.5rem 1rem;color:var(--text-light);font-size:0.85rem;">جاري التحميل...</div>
        </div>
      </div>

      <div class="details-panel" id="task-details-panel">
        <div id="select-order-placeholder" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;text-align:center;color:var(--text-light);">
          <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.25;margin-bottom:1.25rem;">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
          <h3 style="font-size:1.1rem;font-weight:700;color:var(--text-muted);margin-bottom:0.35rem;">اختر طلبية للبدء</h3>
          <p style="font-size:0.83rem;">اضغط على أي طلبية من القائمة لعرض مراحلها</p>
        </div>

        <div id="selected-order-view" class="hidden">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;padding-bottom:1.25rem;margin-bottom:1.25rem;border-bottom:1px solid var(--border);">
            <div>
              <h2 id="view-order-name" style="font-size:1.25rem;color:var(--primary);font-weight:800;margin-bottom:0.3rem;">-</h2>
              <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;">
                <span id="view-order-stage-container"></span>
                <span style="font-size:0.78rem;color:var(--text-muted);">📅 تسليم: <strong id="view-delivery-date" style="color:var(--text-main);">-</strong></span>
              </div>
            </div>
            <div style="text-align:center;min-width:80px;">
              <div style="font-size:1.8rem;font-weight:900;color:var(--success);line-height:1;" id="overall-progress-pct">0%</div>
              <div style="font-size:0.7rem;color:var(--text-light);margin-top:0.2rem;">إجمالي الإنجاز</div>
            </div>
          </div>
          <div class="lanes-grid" id="lanes-grid-container"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Purchase Details Modal -->
  <div id="purchase-details-modal" class="modal-overlay hidden">
    <div class="modal" style="max-width:500px;">
      <div class="modal-header">
        <h3>💰 تفاصيل الشراء</h3>
        <button class="btn btn-secondary btn-sm" onclick="closePurchaseModal()" style="padding:0.5rem">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="purchase-lane-key">
        <input type="hidden" id="purchase-task-idx">
        <div class="purchase-modal-grid">
          <div class="form-group">
            <label for="purchase-supplier">اسم المورد</label>
            <input type="text" id="purchase-supplier" placeholder="اسم المورد">
          </div>
          <div class="form-group">
            <label for="purchase-price">السعر الإجمالي (جنيه)</label>
            <input type="number" id="purchase-price" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label for="purchase-payment-type">طريقة الدفع</label>
            <select id="purchase-payment-type">
              <option value="">-- اختر --</option>
              <option value="كاش">كاش</option>
              <option value="آجل">آجل</option>
            </select>
          </div>
          <div class="form-group">
            <label for="purchase-paid">المبلغ المدفوع (جنيه)</label>
            <input type="number" id="purchase-paid" placeholder="0" min="0">
          </div>
        </div>
        <div class="form-group" style="margin-top:0.5rem;">
          <label for="purchase-notes">ملاحظات / مصاريف إضافية</label>
          <textarea id="purchase-notes" rows="2" placeholder="مثال: مصاريف شحن 200 جنيه..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="savePurchaseDetails()">حفظ التفاصيل</button>
        <button class="btn btn-secondary" onclick="closePurchaseModal()">إلغاء</button>
      </div>
    </div>
  </div>

  <script>
    // ─── Constants ───
    const LANES = [
      { key: 'production_engineer', label: 'مهندس الإنتاج',   emoji: '⚙️', cssClass: 'lane-production' },
      { key: 'inventory_manager',   label: 'مدير التجهيزات',  emoji: '📦', cssClass: 'lane-inventory'   },
      { key: 'purchasing_manager',  label: 'مدير المشتريات', emoji: '🛒', cssClass: 'lane-purchasing'  }
    ];

    // When a lane is completed → auto-advance to this stage
    const LANE_NEXT_STAGE = {
      'production_engineer': 'شراء الخامات',
      'inventory_manager':   'قيد التصنيع / التجهيز',
      'purchasing_manager':  'جاهز للتسليم'
    };

    let activeOrders  = [];
    let selectedOrder = null;
    let searchFilter  = '';
    let currentUserRole = null;

    const IS_ADMIN_ROLE = (role) => ['admin', 'manager'].includes(role);

    // ─── Task parsing ───
    function parseAllTasks(order) {
      if (!order || !order.pending_materials) return {};
      const pm = order.pending_materials;
      if (Array.isArray(pm)) return { production_engineer: pm, inventory_manager: [], purchasing_manager: [] };
      return pm;
    }

    async function saveAllTasks(orderId, tasksObj) {
      try {
        const sb = getSupabase();
        const { error } = await sb.from('client_orders').update({ pending_materials: tasksObj }).eq('id', orderId);
        if (error) throw error;
        const order = activeOrders.find(o => o.id === orderId);
        if (order) order.pending_materials = tasksObj;
      } catch (err) {
        showAlert('فشل حفظ البيانات: ' + err.message, 'error');
      }
    }

    function isLaneComplete(tasksObj, laneKey) {
      const tasks = tasksObj[laneKey] || [];
      return tasks.length > 0 && tasks.every(t => t.done);
    }

    function isLaneLocked(laneKey, tasksObj) {
      const laneIdx = LANES.findIndex(l => l.key === laneKey);
      if (laneIdx === 0) return false;
      return !isLaneComplete(tasksObj, LANES[laneIdx - 1].key);
    }

    function calcOverallProgress(tasksObj) {
      let total = 0, done = 0;
      LANES.forEach(l => { const t = tasksObj[l.key] || []; total += t.length; done += t.filter(x => x.done).length; });
      return total > 0 ? Math.round((done / total) * 100) : 0;
    }

    function getStageBadgeHTML(stage) {
      if (!stage) return `<span class="badge-stage stage-default">مجهول</span>`;
      let cls = 'stage-default';
      if (stage.includes('عربون') || stage.includes('تعاقد')) cls = 'stage-contract';
      else if (stage.includes('تنفيذ') || stage.includes('خامات') || stage.includes('تصنيع')) cls = 'stage-production';
      else if (stage.includes('شحن') || stage.includes('توصيل') || stage.includes('تسليم') || stage.includes('جاهز')) cls = 'stage-delivery';
      return `<span class="badge-stage ${cls}">${stage}</span>`;
    }

    function getOrderDisplayName(order) {
      return order.order_display_name || order.client_name || '-';
    }

    // ─── Render Orders List ───
    function renderOrdersList() {
      const container = document.getElementById('orders-list-container');
      const badge = document.getElementById('orders-badge');
      const filtered = activeOrders.filter(o => !searchFilter || getOrderDisplayName(o).toLowerCase().includes(searchFilter));
      badge.textContent = `${filtered.length} طلبية`;

      if (filtered.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:3rem 1rem;color:var(--text-light);font-size:0.85rem;">لا توجد طلبيات مطابقة</div>`;
        return;
      }

      container.innerHTML = '';
      filtered.forEach(order => {
        const tasksObj = parseAllTasks(order);
        let total = 0, done = 0;
        LANES.forEach(l => { const t = tasksObj[l.key] || []; total += t.length; done += t.filter(x => x.done).length; });
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;
        const displayName = getOrderDisplayName(order);

        const itemDiv = document.createElement('div');
        itemDiv.className = `task-order-item ${selectedOrder && selectedOrder.id === order.id ? 'active' : ''}`;
        itemDiv.onclick = () => selectOrder(order);
        itemDiv.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <strong style="color:var(--text-main);font-size:0.92rem;font-weight:800;">${displayName}</strong>
            ${getStageBadgeHTML(order.stage)}
          </div>
          <div style="display:flex;justify-content:space-between;font-size:0.73rem;color:var(--text-muted);margin-top:0.15rem;">
            <span>تسليم: <strong>${order.delivery_date || 'غير محدد'}</strong></span>
            <span><strong>${done}/${total}</strong> مهمة (${pct}%)</span>
          </div>
          <div class="order-progress-track"><div class="order-progress-bar" style="width:${pct}%;"></div></div>
        `;
        container.appendChild(itemDiv);
      });
    }

    function filterOrdersList() {
      searchFilter = document.getElementById('search-orders').value.trim().toLowerCase();
      renderOrdersList();
    }

    function selectOrder(order) {
      selectedOrder = order;
      document.getElementById('select-order-placeholder').classList.add('hidden');
      document.getElementById('selected-order-view').classList.remove('hidden');
      renderOrdersList();
      renderSelectedOrderView();
    }

    function renderSelectedOrderView() {
      if (!selectedOrder) return;
      document.getElementById('view-order-name').textContent = getOrderDisplayName(selectedOrder);
      document.getElementById('view-order-stage-container').innerHTML = getStageBadgeHTML(selectedOrder.stage);
      document.getElementById('view-delivery-date').textContent = selectedOrder.delivery_date || 'غير محدد';

      const tasksObj = parseAllTasks(selectedOrder);
      document.getElementById('overall-progress-pct').textContent = calcOverallProgress(tasksObj) + '%';
      renderLanes(tasksObj);
    }

    function renderLanes(tasksObj) {
      const container = document.getElementById('lanes-grid-container');
      container.innerHTML = '';

      LANES.forEach((lane, laneIdx) => {
        const tasks   = tasksObj[lane.key] || [];
        const doneTasks = tasks.filter(t => t.done).length;
        const total   = tasks.length;
        const pct     = total > 0 ? Math.round((doneTasks / total) * 100) : 0;
        const locked  = isLaneLocked(lane.key, tasksObj);
        const allDone = total > 0 && doneTasks === total;

        // Can edit: my lane OR admin/manager (see all, edit all)
        const isMyLane = (currentUserRole === lane.key) || IS_ADMIN_ROLE(currentUserRole);
        const canEdit  = isMyLane && !locked;

        // ── Header badge ──
        let headerBadge = '';
        if (locked) {
          headerBadge = `<span class="locked-badge">🔒 بانتظار ${LANES[laneIdx - 1]?.label || ''}</span>`;
        } else if (allDone) {
          headerBadge = `<span class="completed-badge">✅ مكتمل</span>`;
        } else {
          headerBadge = `<span style="font-size:0.7rem;color:var(--text-muted);background:var(--border-light);padding:2px 8px;border-radius:6px;font-weight:700;">${doneTasks}/${total}</span>`;
        }

        // ── Task rows ──
        let taskRowsHTML = '';
        if (tasks.length === 0) {
          taskRowsHTML = `<div style="text-align:center;padding:1.5rem 0.5rem;color:var(--text-muted);font-size:0.8rem;opacity:0.7;">${locked ? '🔒 مغلق' : 'لا توجد مهام. أضف من الأسفل.'}</div>`;
        } else {
          tasks.forEach((task, idx) => {
            const checkboxClick = canEdit ? `onclick="toggleTask('${lane.key}', ${idx})"` : '';
            const deleteBtn = canEdit ? `<button class="btn-task-action btn-task-delete" onclick="deleteTask('${lane.key}', ${idx})" title="حذف">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            </button>` : '';

            // ── Purchase details chips ──
            let purchaseHTML = '';
            const pd = task.purchase_details;
            if (pd && typeof pd === 'object') {
              const chips = [];
              if (pd.supplier)      chips.push(`🏭 ${pd.supplier}`);
              if (pd.price)         chips.push(`💰 ${Number(pd.price).toLocaleString()} جنيه`);
              if (pd.payment_type)  chips.push(pd.payment_type === 'كاش' ? '💵 كاش' : '📋 آجل');
              if (pd.paid)          chips.push(`✅ دُفع ${Number(pd.paid).toLocaleString()} جنيه`);
              if (pd.notes)         chips.push(`📝 ${pd.notes}`);
              if (chips.length > 0) {
                purchaseHTML = `<div class="purchase-details-strip">${chips.map(c => `<span class="purchase-chip">${c}</span>`).join('')}</div>`;
              }
            }

            // ── Purchase button: show for my lane OR admin ──
            const purchaseBtn = (isMyLane && !locked) ? `<button class="btn-task-action" onclick="openPurchaseModal('${lane.key}', ${idx})" title="تفاصيل الشراء" style="color:#b45309;">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1.5" fill="currentColor"/><circle cx="20" cy="21" r="1.5" fill="currentColor"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            </button>` : '';

            taskRowsHTML += `
              <div class="task-row ${task.done ? 'completed' : ''}">
                <div class="custom-checkbox" ${checkboxClick} style="${!canEdit ? 'cursor:default;' : ''}">
                  <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <div style="flex:1;min-width:0;">
                  <span class="task-text">${task.text}</span>
                  ${purchaseHTML}
                </div>
                ${purchaseBtn}
                ${deleteBtn}
              </div>
            `;
          });
        }

        // ── Add task form ──
        const addForm = canEdit ? `
          <form class="add-task-form" onsubmit="addTask(event, '${lane.key}')">
            <input class="add-task-input" type="text" id="new-task-${lane.key}" placeholder="أضف مهمة...">
            <button type="submit" class="btn btn-primary btn-sm" style="white-space:nowrap;padding:0 0.85rem;">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </form>` : '';

        const laneEl = document.createElement('div');
        laneEl.className = `lane-card ${lane.cssClass} ${locked ? 'lane-locked' : ''}`;
        laneEl.innerHTML = `
          <div class="lane-header">
            <span>${lane.emoji}</span>
            <span style="flex:1;">${lane.label}</span>
            ${headerBadge}
          </div>
          <div class="lane-progress-wrap">
            <div class="lane-progress-track">
              <div class="lane-progress-bar" style="width:${pct}%;"></div>
            </div>
          </div>
          <div class="lane-body">
            ${taskRowsHTML}
            ${addForm}
          </div>
        `;
        container.appendChild(laneEl);
      });
    }

    // ─── Task Actions ───
    async function toggleTask(laneKey, idx) {
      if (!selectedOrder) return;
      const tasksObj = parseAllTasks(selectedOrder);

      if (isLaneLocked(laneKey, tasksObj)) {
        showAlert('🔒 لا يمكنك إكمال هذه المرحلة قبل إنهاء المرحلة السابقة', 'error');
        return;
      }

      const tasks = tasksObj[laneKey] || [];
      tasks[idx].done = !tasks[idx].done;
      tasksObj[laneKey] = tasks;

      await saveAllTasks(selectedOrder.id, tasksObj);

      // ── Auto-advance stage when lane is fully completed ──
      const allDoneNow = tasks.length > 0 && tasks.every(t => t.done);
      if (allDoneNow && LANE_NEXT_STAGE[laneKey]) {
        try {
          const nextStage = LANE_NEXT_STAGE[laneKey];
          const sb = getSupabase();
          await sb.from('client_orders').update({ stage: nextStage }).eq('id', selectedOrder.id);
          selectedOrder.stage = nextStage;
          const inList = activeOrders.find(o => o.id === selectedOrder.id);
          if (inList) inList.stage = nextStage;
          showAlert(`🎉 أحسنت! الأوردر انتقل تلقائياً لـ "${nextStage}"`, 'success');
        } catch (e) {
          console.warn('Stage advance error:', e.message);
        }
      }

      renderOrdersList();
      renderSelectedOrderView();
    }

    async function addTask(event, laneKey) {
      event.preventDefault();
      if (!selectedOrder) return;
      const input = document.getElementById(`new-task-${laneKey}`);
      const text = input.value.trim();
      if (!text) return;

      const tasksObj = parseAllTasks(selectedOrder);
      if (!tasksObj[laneKey]) tasksObj[laneKey] = [];
      tasksObj[laneKey].push({ text, done: false, purchase_details: {} });

      await saveAllTasks(selectedOrder.id, tasksObj);
      renderOrdersList();
      renderSelectedOrderView();
      input.value = '';
    }

    async function deleteTask(laneKey, idx) {
      if (!selectedOrder) return;
      const tasksObj = parseAllTasks(selectedOrder);
      if (!tasksObj[laneKey]) return;
      tasksObj[laneKey].splice(idx, 1);
      await saveAllTasks(selectedOrder.id, tasksObj);
      renderOrdersList();
      renderSelectedOrderView();
    }

    // ─── Purchase Modal ───
    function openPurchaseModal(laneKey, idx) {
      const tasksObj = parseAllTasks(selectedOrder);
      const task = (tasksObj[laneKey] || [])[idx];
      if (!task) return;

      document.getElementById('purchase-lane-key').value = laneKey;
      document.getElementById('purchase-task-idx').value  = idx;

      const pd = task.purchase_details || {};
      document.getElementById('purchase-supplier').value      = pd.supplier || '';
      document.getElementById('purchase-price').value         = pd.price || '';
      document.getElementById('purchase-payment-type').value  = pd.payment_type || '';
      document.getElementById('purchase-paid').value          = pd.paid || '';
      document.getElementById('purchase-notes').value         = pd.notes || '';

      document.getElementById('purchase-details-modal').classList.remove('hidden');
    }

    function closePurchaseModal() {
      document.getElementById('purchase-details-modal').classList.add('hidden');
    }

    async function savePurchaseDetails() {
      const laneKey = document.getElementById('purchase-lane-key').value;
      const idx     = parseInt(document.getElementById('purchase-task-idx').value);
      if (!selectedOrder) return;

      const tasksObj = parseAllTasks(selectedOrder);
      const task = (tasksObj[laneKey] || [])[idx];
      if (!task) return;

      task.purchase_details = {
        supplier:     document.getElementById('purchase-supplier').value.trim() || null,
        price:        document.getElementById('purchase-price').value ? parseFloat(document.getElementById('purchase-price').value) : null,
        payment_type: document.getElementById('purchase-payment-type').value || null,
        paid:         document.getElementById('purchase-paid').value ? parseFloat(document.getElementById('purchase-paid').value) : null,
        notes:        document.getElementById('purchase-notes').value.trim() || null
      };

      // Clean nulls
      Object.keys(task.purchase_details).forEach(k => { if (!task.purchase_details[k]) delete task.purchase_details[k]; });

      await saveAllTasks(selectedOrder.id, tasksObj);
      closePurchaseModal();
      renderSelectedOrderView();
      showAlert('تم حفظ تفاصيل الشراء ✅', 'success');
    }

    // ─── Load Orders ───
    async function loadActiveOrders() {
      const sb = getSupabase();
      try {
        const { data, error } = await sb
          .from('client_orders')
          .select('id, client_name, order_display_name, stage, delivery_date, pending_materials, created_at')
          .eq('archived', false)
          .not('stage', 'eq', 'تم التسليم للزبون')
          .order('created_at', { ascending: false });
        if (error) throw error;
        activeOrders = data || [];
        if (selectedOrder) {
          const fresh = activeOrders.find(o => o.id === selectedOrder.id);
          if (fresh) selectedOrder = fresh;
        }
        renderOrdersList();
        if (selectedOrder) renderSelectedOrderView();
      } catch (err) {
        showAlert('فشل تحميل الطلبيات: ' + err.message, 'error');
      }
    }

    // ─── Init ───
    async function initTasksPage() {
      const authData = await initAuth();
      currentUserRole = (authData && authData.profile)
        ? authData.profile.role
        : (currentProfile ? currentProfile.role : null);

      await loadActiveOrders();

      const sb = getSupabase();
      sb.channel('tasks-realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'client_orders' }, () => {
        loadActiveOrders();
      }).subscribe();
    }

    window.onload = initTasksPage;
  </script>
</body>
