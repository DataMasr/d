<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قسم الشراء - نظام الإدارة</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/auth.js"></script>
  <style>
    .order-purchase-card {
      background: #fff;
      border: 1px solid var(--border);
      border-right: 5px solid var(--primary);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow-sm);
      transition: all 0.25s ease;
    }

    .order-purchase-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .material-need-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.9rem;
      background: #f8fafc;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      border: 1px solid var(--border-light);
    }

    .qty-badge {
      background: #fee2e2;
      color: #dc2626;
      font-weight: 800;
      font-size: 0.9rem;
      padding: 0.25rem 0.75rem;
      border-radius: 50px;
      min-width: 50px;
      text-align: center;
    }

    .aggregate-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1rem;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.6rem;
      transition: all 0.2s;
    }

    .aggregate-row:hover {
      background: #f8fafc;
      border-color: #c7d2fe;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .empty-state h3 {
      color: var(--text-main);
      margin-bottom: 0.5rem;
    }

    .buy-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.65rem 1.25rem;
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .buy-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(99, 102, 241, 0.4);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .section-title .line {
      width: 5px;
      height: 28px;
      border-radius: 3px;
      background: var(--primary);
    }

    .section-title h2 {
      margin: 0;
      font-size: 1.15rem;
      color: var(--text-main);
    }

    @media (max-width: 768px) {
      .purchase-grid {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>

<body>
  <main class="main-content">

    
    <div class="page-header">
      <div style="display:flex; align-items:center; gap:0.75rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linecap="round"
          stroke-linejoin="round" style="width:30px;height:30px;flex-shrink:0;">
          <circle cx="9" cy="21" r="1.5" fill="var(--primary)" />
          <circle cx="20" cy="21" r="1.5" fill="var(--primary)" />
          <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6" />
        </svg>
        <h1 style="font-size:1.65rem; font-weight:900; margin:0;">قسم الشراء</h1>
      </div>
      <p style="color:var(--text-muted); font-size:0.9rem; margin-top:0.25rem;">الطلبيات التي تحتاج شراء خامات ناقصة من
        المورد</p>
    </div>
    <button class="btn btn-secondary" onclick="initPurchasingPage()" style="gap:0.5rem;">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      تحديث
    </button>
    </div>

    
    <div class="stats-grid" style="margin-bottom:2rem;">
      <div class="stat-card" style="border-right:4px solid #ef4444;">
        <h3>طلبيات متوقفة</h3>
        <div class="value" id="stat-pending" style="color:#ef4444;">0</div>
        <p style="font-size:0.78rem; color:var(--text-muted); margin-top:0.4rem;">بانتظار شراء الخامات</p>
      </div>
      <div class="stat-card" style="border-right:4px solid var(--warning);">
        <h3>أصناف ناقصة</h3>
        <div class="value" id="stat-items" style="color:var(--warning);">0</div>
        <p style="font-size:0.78rem; color:var(--text-muted); margin-top:0.4rem;">صنف يحتاج شراء</p>
      </div>
    </div>

    <div class="purchase-grid" style="display:grid; grid-template-columns: 360px 1fr; gap:1.75rem; align-items:start;">

      
      <div>
        <div class="section-title">
          <div class="line"></div>
          <h2
            style="margin:0; font-size:1.15rem; color:var(--text-main); display:flex; align-items:center; gap:0.5rem;">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="var(--primary)" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
              <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" />
            </svg>
            خلاصة المشتريات
          </h2>
        </div>
        <div
          style="background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; box-shadow:var(--shadow-sm);">
          <p
            style="font-size:0.82rem; color:var(--text-muted); margin-bottom:1rem; padding-bottom:0.75rem; border-bottom:1px solid var(--border);">
            📌 المجاميع التالية هي إجمالي الكميات المطلوب شراؤها ة:
          </p>
          <div id="aggregate-list">
            <div style="text-align:center; padding:2rem; color:var(--text-muted);">جاري التحميل...</div>
          </div>
        </div>
      </div>

      
      <div>
        <div class="section-title">
          <div class="line" style="background:var(--success);"></div>
          <h2
            style="margin:0; font-size:1.15rem; color:var(--text-main); display:flex; align-items:center; gap:0.5rem;">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="var(--success)" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line>
              <path
                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
              </path>
              <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
              <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            تفاصيل كل طلبية
          </h2>
        </div>
        <div id="orders-list">
          <div style="text-align:center; padding:2rem; color:var(--text-muted);">جاري التحميل...</div>
        </div>
      </div>

    </div>
  </main>

  <script>
    async function initPurchasingPage() {
      await initAuth();
      const sb = getSupabase();

      const aggregateEl = document.getElementById('aggregate-list');
      const ordersList = document.getElementById('orders-list');

      aggregateEl.innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--text-muted);">جاري التحميل...</div>';
      ordersList.innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--text-muted);">جاري التحميل...</div>';

      try {
        const { data: orders, error } = await sb.from('client_orders')
          .select('*')
          .eq('archived', false)
          .ilike('material_notes', '%عجز (معتمد للشراء)%')
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (!orders || orders.length === 0) {
          document.getElementById('stat-pending').textContent = '0';
          document.getElementById('stat-items').textContent = '0';
          aggregateEl.innerHTML = `
            <div class="empty-state">
              <div class="icon" style="color:var(--success);">
                <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
              </div>
              <h3>لا يوجد نواقص</h3>
              <p>المخزن كافٍ لجميع الطلبيات الحالية</p>
            </div>`;
          ordersList.innerHTML = '';
          return;
        }

        document.getElementById('stat-pending').textContent = orders.length;

        let aggregate = {};
        ordersList.innerHTML = '';

        orders.forEach(order => {
          const lines = (order.material_notes || '').split('\n');
          let deficits = [];

          lines.forEach(line => {
            if (line.includes('عجز (معتمد للشراء)')) {
              let name = '';
              const match1 = line.match(/تم سحب \d+ من (.+?) \(/);
              const match2 = line.match(/تم طلب شراء من الخارج \d+ من (.+?) \[عجز/);
              
              if (match1) name = match1[1].trim();
              else if (match2) name = match2[1].trim();

              const qtyMatch = line.match(/عجز \(معتمد للشراء\):\s*(\d+)/);
              if (name && qtyMatch) {
                const qty = parseInt(qtyMatch[1], 10);
                deficits.push({ name, qty });
                if (!aggregate[name]) aggregate[name] = { qty: 0, orders: [] };
                aggregate[name].qty += qty;
                if (!aggregate[name].orders.includes(order.client_name))
                  aggregate[name].orders.push(order.client_name);
              }
            }
          });

          if (deficits.length === 0) return;

          const card = document.createElement('div');
          card.className = 'order-purchase-card';
          card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1rem;">
              <div>
                <div style="font-size:1.05rem; font-weight:800; color:var(--text-main);">${order.client_name}</div>
                <div style="font-size:0.78rem; color:var(--text-muted); margin-top:0.2rem;">
                  📅 ${new Date(order.created_at).toLocaleDateString('ar-EG')}
                  &nbsp;|&nbsp; 💰 ${(order.total_price || 0).toLocaleString()} ج.م
                </div>
              </div>
              <button class="buy-btn" onclick="completePurchase('${order.id}', \`${(order.material_notes || '').replace(/`/g, '')}\`)">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                تم الشراء لهذه الطلبية
              </button>
            </div>
            <div>
              ${deficits.map(d => `
                <div class="material-need-row">
                  <div style="display:flex;align-items:center;gap:0.5rem;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12" opacity="0.5"/></svg>
                    <span style="font-weight:600; color:var(--text-main);">${d.name}</span>
                  </div>
                  <span class="qty-badge">${d.qty}</span>
                </div>
              `).join('')}
            </div>
          `;
          ordersList.appendChild(card);
        });

        const items = Object.keys(aggregate);
        document.getElementById('stat-items').textContent = items.length;

        aggregateEl.innerHTML = '';
        if (items.length === 0) {
          aggregateEl.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-muted);">لا يوجد نواقص</div>';
          return;
        }

        items.forEach(name => {
          const a = aggregate[name];
          const div = document.createElement('div');
          div.className = 'aggregate-row';
          div.innerHTML = `
            <div>
              <div style="font-weight:700; color:var(--text-main);">${name}</div>
              <div style="font-size:0.75rem; color:var(--text-muted); margin-top:0.2rem;">
                ${a.orders.map(o => `<span style="background:#eff6ff;color:#2563eb;padding:0.15rem 0.5rem;border-radius:50px;font-size:0.72rem;font-weight:700;margin-left:0.25rem;">${o}</span>`).join('')}
              </div>
            </div>
            <span style="background:#fee2e2;color:#dc2626;font-weight:800;font-size:1.05rem;padding:0.3rem 0.9rem;border-radius:50px;">${a.qty}</span>
          `;
          aggregateEl.appendChild(div);
        });

      } catch (e) {
        aggregateEl.innerHTML = `<div style="color:var(--error);padding:1rem;">خطأ: ${e.message}</div>`;
      }
    }

    async function completePurchase(orderId, oldNotes) {
      if (!(await customConfirm('✅ هل تم شراء جميع النواقص لهذه الطلبية وتريد تحويلها لـ "قيد التصنيع"؟'))) return;
      try {
        showAlert('جاري التحديث...', 'pending');
        const sb = getSupabase();
        const newNotes = oldNotes.replace(/\[عجز \(معتمد للشراء\):\s*\d+\]/g, 'تم الشراء ✅');
        const { error } = await sb.from('client_orders').update({
          material_notes: newNotes,
          stage: 'قيد التصنيع / التجهيز'
        }).eq('id', orderId);
        if (error) throw error;

        let logsToInsert = [];
        const lines = oldNotes.split('\n');
        lines.forEach(line => {
          if (line.includes('عجز (معتمد للشراء)')) {
              let name = '';
              const match1 = line.match(/تم سحب \d+ من (.+?) \(/);
              const match2 = line.match(/تم طلب شراء من الخارج \d+ من (.+?) \[عجز/);
              if (match1) name = match1[1].trim();
              else if (match2) name = match2[1].trim();
              
              const qtyMatch = line.match(/عجز \(معتمد للشراء\):\s*(\d+)/);
              if (name && qtyMatch) {
                const qty = parseInt(qtyMatch[1], 10);
                logsToInsert.push({
                  item_name: name,
                  action_type: 'إضافة',
                  quantity: qty,
                  warehouse: 'مشتريات خارجية',
                  notes: `شراء مباشر لاستكمال العجز في الطلبية`
                });
              }
          }
        });

        if (logsToInsert.length > 0) {
          await sb.from('inventory_logs').insert(logsToInsert);
        }

        showAlert('تم التحديث! الطلبية الآن قيد التصنيع ✅', 'success');
        await initPurchasingPage();
      } catch (e) {
        showAlert('خطأ: ' + e.message, 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await initPurchasingPage();
      const sb = getSupabase();
      sb.channel('purchasing-rt')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'client_orders' }, () => initPurchasingPage())
        .subscribe();
      setInterval(initPurchasingPage, 10000);
    });
  </script>
</body>

</html>
